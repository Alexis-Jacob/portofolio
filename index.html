<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexis Jacob Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; background: #f8f7f3; }
    ::selection { background: #b1803f; color: #fff; }
    :root {
      --bg: #f8f7f3;
      --bg2: #eeebe2;
      --navbg: rgba(248,247,243,.82);
      --text: #1b1813;
      --text2: #3c362b;
      --muted: #6f6757;
      --faint: #9c9484;
      --accent: #b1803f;
      --line: rgba(28,24,18,.12);
    }
    #app { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }
    .ph { display: block; }
    .nav-link { cursor: pointer; transition: color .2s; }
    .nav-link:hover { color: var(--text) !important; }
    .btn-outline { transition: all .2s; }
    .btn-outline:hover { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
    .work-row { transition: background .2s; }
    .work-row:hover { background: rgba(28,24,18,.03); }
    .series-card:hover .sc-title { color: var(--accent); transition: color .2s; }
    input, textarea {
      display: block; width: 100%; background: transparent; border: none;
      border-bottom: 1px solid rgba(28,24,18,.2); color: var(--text);
      font-family: 'Space Grotesk', sans-serif; font-size: 16px; outline: none;
      padding: 14px 0; transition: border-color .2s;
    }
    input::placeholder, textarea::placeholder { color: var(--faint); }
    input:focus, textarea:focus { border-bottom-color: var(--accent); }
    textarea { resize: vertical; }
    button[type=submit]:hover { opacity: .88; }
    h1, h2, p { margin: 0; }
    #lb { display:flex; align-items:center; justify-content:center; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.93); touch-action:none; visibility:hidden; pointer-events:none; }
    #lb.open { visibility:visible; pointer-events:all; }
    #lb img { max-width:90vw; max-height:90vh; object-fit:contain; user-select:none; display:block; }
    #lb-prev, #lb-next { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: #fff; font-size: 52px; line-height: 1; cursor: pointer; padding: 16px 24px; opacity: .55; transition: opacity .15s; }
    #lb-prev:hover, #lb-next:hover { opacity: 1; }
    #lb-prev { left: 0; }
    #lb-next { right: 0; }
    #lb-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 36px; line-height: 1; cursor: pointer; opacity: .6; transition: opacity .15s; padding: 8px; }
    #lb-close:hover { opacity: 1; }
    @media (max-width: 600px) {
      #lb-prev, #lb-next { font-size: 38px; padding: 12px 16px; opacity: .7; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<div id="lb" onclick="closeLB()">
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
  <button id="lb-close" onclick="closeLB()">×</button>
  <button id="lb-prev" onclick="lbNav(-1);event.stopPropagation()">‹</button>
  <button id="lb-next" onclick="lbNav(1);event.stopPropagation()">›</button>
</div>
<script>
const S = { view: 'home', series: 0 };

const BASE = 'https://res.cloudinary.com/g2vm121o/image/upload/f_auto,q_auto/l_My%20Brand:alexis-jacob-black_yryv5c,w_0.2,fl_relative,o_70,g_south_east,fl_layer_apply/';
const NYC_PHOTOS = [
  BASE + 'v1782418297/signal-2026-05-17-172655_007_xbhmxb.jpg',  // 1 — coucher de soleil aérien, Manhattan vue d'en haut
  BASE + 'v1782418297/signal-2026-05-17-172655_008_sthuyl.jpg',  // 2 — Empire State dorée au crépuscule
  BASE + 'v1782418298/signal-2026-05-17-172655_010_sli0e5.jpg',  // 3 — taxis jaunes et cycliste, midtown
  BASE + 'v1782418298/signal-2026-05-17-172655_014_zpu0ev.jpg',  // 4 — NYPD traversant la 42nd Street
  BASE + 'v1782418298/signal-2026-05-17-172655_011_jluj68.jpg',  // 5 — vapeur et néons, Times Square
  BASE + 'v1782418298/signal-2026-05-17-172655_012_y7m5w6.jpg',  // 6 — saxophoniste de rue
  BASE + 'v1782418296/signal-2026-05-17-172655_002_letims.jpg',  // 7 — manifestation pro-palestinienne
  BASE + 'v1782418298/signal-2026-05-17-172655_013_cktlel.jpg',  // 8 — "Feeling Invisible", contre un mur
  BASE + 'v1782418296/signal-2026-05-17-172655_003_lw3rie.jpg',  // 9 — Saint-Georges aux Nations Unies
  BASE + 'v1782418297/signal-2026-05-17-172655_009_viwzcm.jpg',  // 10 — couloir de Broadway, la nuit
  BASE + 'v1782418297/signal-2026-05-17-172655_006_qbz8lg.jpg',  // 11 — reflet de nuit dans une flaque
  BASE + 'v1782418297/signal-2026-05-17-172655_005_f61cuc.jpg',  // 12 — Halal Guys et sculpture LOVE
];

const SIKKIM_PHOTOS = [
  BASE + 'v1782423635/067A4913_glh0px.jpg',           //  1 — ville au réveil, toits dans la brume du matin
  BASE + 'v1782423630/067A4912_s6btgi.jpg',           //  2 — drapeaux de prière, monastère sous le ciel bleu
  BASE + 'v1782423625/067A4899_wsutru.jpg',           //  3 — écoliers en rouge sur le chemin pavé
  BASE + 'v1782423620/067A4896-Modifier_xktk08.jpg',  //  4 — assis en cercle avec les enfants de l\'école
  BASE + 'v1782423522/IMG_6484_d6msee.jpg',           //  5 — stupa blanc et œillets orangés dans le jardin
  BASE + 'v1782423547/IMG_6589_cly83y.jpg',           //  6 — forêt de hampes de prière, marigolds en fête
  BASE + 'v1782423542/IMG_6588_o7ania.jpg',           //  7 — le monastère au soleil du matin
  BASE + 'v1782423557/067A4468-Modifier_mffxbj.jpg',  //  8 — petit enfant au bonnet turquoise dans la foule
  BASE + 'v1782423552/067A4462-Modifier_dg2whb.jpg',  //  9 — regard d\'enfant au festival du cham
  BASE + 'v1782423640/IMG_6342_abogrd.jpg',           // 10 — danseur masqué, marionnettes levées vers la foule
  BASE + 'v1782423513/IMG_6381_epjdaz.jpg',           // 11 — masque doré, danse sacrée au monastère
  BASE + 'v1782423615/067A4864_gy2spo.jpg',           // 12 — gâteau "Happy Rex", nuit au refuge
  BASE + 'v1782423576/067A4638_vynntt.jpg',           // 13 — halte de trek, drapeaux et cheval au repos
  BASE + 'v1782423527/IMG_6494_qfq58v.jpg',           // 14 — chevaux chargés dans la forêt tropicale
  BASE + 'v1782423582/067A4649_p1gopn.jpg',           // 15 — yaks sur le sentier, vallée en contrebas
  BASE + 'v1782423532/IMG_6528_j7dgow.jpg',           // 16 — coucher de soleil depuis les crêtes, ciel en feu
  BASE + 'v1782423611/067A4856_ozp3ii.jpg',           // 17 — bougie dans une bouteille, nuit au refuge de trek
  BASE + 'v1782423586/067A4663_bqqukq.jpg',           // 18 — alpenglow sur la chaîne, silhouette de forêt
  BASE + 'v1782423591/067A4682_k4wnbc.jpg',           // 19 — cairn, drapeaux de prière et Kangchenjunga
  BASE + 'v1782423596/067A4772-Modifier_rviiiz.jpg',  // 20 — caravane de chevaux sous un sommet enneigé
  BASE + 'v1782423601/067A4809_hzoppl.jpg',           // 21 — Kangchenjunga en feu au lever du soleil, large
  BASE + 'v1782423606/067A4810-Modifier_ast05x.jpg',  // 22 — Kangchenjunga en feu au lever du soleil, serré
  BASE + 'v1782423537/IMG_6553-Modifier_bbdx41.jpg',  // 23 — face sud depuis le camp de base
  BASE + 'v1782423571/067A4559-Modifier_p5gpva.jpg',  // 24 — Leh depuis les hauteurs, désert ocre du Ladakh
  BASE + 'v1782423517/IMG_6462_fllvvh.jpg',           // 25 — hôtel Omasila, peupliers dorés de Leh
  BASE + 'v1782423562/067A4513-Modifier_hjefvv.jpg',  // 26 — monastère sur la falaise, vallée du Ladakh
  BASE + 'v1782423567/067A4537_riexgd.jpg',           // 27 — confluent Zanskar-Indus, turquoise dans le désert
];

const SERIES = [
  { title: 'New York City',       kind: 'Voyage',   year: '2026', count: 12, blurb: 'Mai 2026, au Leica. De la hauteur des toits à l\'invisible des trottoirs — la ville dans tous ses états.', photos: NYC_PHOTOS, cover: NYC_PHOTOS[0], grad: 3 },
  { title: 'Sikkim & Ladakh',     kind: 'Voyage',   year: '2017', count: 27, blurb: 'Du festival du cham aux alpenglow du Kangchenjunga, puis le désert minéral du Ladakh. Un voyage, deux mondes himalayens.', photos: SIKKIM_PHOTOS, cover: SIKKIM_PHOTOS[21], grad: 4 },
  { title: 'Hivers de Patagonie', kind: 'Paysage',  year: '2025', count: 24, blurb: 'Deux semaines à suivre la lumière des tempêtes sur les champs de glace du sud.', grad: 5 },
  { title: 'Visages de la Route', kind: 'Portrait', year: '2024', count: 18, blurb: 'Des inconnus croisés sur trois mille miles d\'autoroute ouverte.', grad: 8 },
  { title: 'Nuits d\'Atacama',    kind: 'Voyage',   year: '2023', count: 21, blurb: 'Le désert le plus aride de la planète, photographié uniquement après la tombée de la nuit.', grad: 2 },
  { title: 'Pays de Neige',       kind: 'Paysage',  year: '2024', count: 16, blurb: 'Hokkaido en plein hiver — formes réduites à la neige et à l\'ombre.', grad: 10 },
  { title: 'Seuils du Nord',      kind: 'Portrait', year: '2022', count: 20, blurb: 'Portes et visages au bord du cercle arctique.', grad: 7 },
];

const HEIGHTS = [360, 250, 440, 300, 320, 400, 270, 360];

// 12 gradients simulating landscape/travel tones
const G = [
  'linear-gradient(160deg,#c8d8e0,#a0b8c4,#8aa4b0)',  // 0 - misty blue
  'linear-gradient(140deg,#c4cfa8,#a8bb84,#8fa870)',  // 1 - green
  'linear-gradient(150deg,#e0d0b0,#c8b890,#b0a070)',  // 2 - warm sand
  'linear-gradient(135deg,#b4ccd8,#90aec0,#6888a0)',  // 3 - sky blue
  'linear-gradient(145deg,#d8c8a0,#c4b080,#b09060)',  // 4 - golden
  'linear-gradient(130deg,#9fb8c8,#7898b0,#506888)',  // 5 - stormy
  'linear-gradient(155deg,#d4ccc0,#c0b4a4,#a89884)',  // 6 - overcast
  'linear-gradient(145deg,#c0ccd8,#98b0c0,#7094a8)',  // 7 - ice/mountain
  'linear-gradient(140deg,#d0b8a8,#b89888,#a07860)',  // 8 - warm portrait
  'linear-gradient(135deg,#b0c0d0,#8898b0,#607090)',  // 9 - twilight
  'linear-gradient(150deg,#dcd0b4,#c4b898,#b0a080)',  // 10 - bright warm
  'linear-gradient(145deg,#aac0ce,#88a4b8,#6088a0)',  // 11 - blue grey
];

const GP = [
  'linear-gradient(145deg,#d0c0b0,#b8a898,#a09080)',  // portrait 1
  'linear-gradient(150deg,#c8c0b8,#b0a8a0,#988e84)',  // portrait 2
];

function box(g, w, h) {
  return `<div class="ph" style="width:${w};height:${h}px;background:${g};"></div>`;
}

function coverImg(s, w, h) {
  return s.cover
    ? `<img src="${s.cover}" style="width:${w};height:${h}px;object-fit:cover;display:block;" loading="lazy">`
    : box(G[s.grad], w, h);
}

function readHash() {
  const h = window.location.hash.slice(1) || 'home';
  const [view, si] = h.split('/');
  S.view = ['home','work','series','about'].includes(view) ? view : 'home';
  if (si !== undefined) S.series = parseInt(si, 10) || 0;
}

function go(view, si) {
  S.view = view;
  if (si !== undefined) S.series = si;
  const hash = si !== undefined ? `${view}/${si}` : view;
  history.pushState(null, '', '#' + hash);
  render();
  window.scrollTo(0, 0);
}

window.addEventListener('popstate', () => { readHash(); render(); window.scrollTo(0, 0); });


function nav() {
  return `<div style="position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:22px 56px;background:var(--navbg);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);">
  <div onclick="go('home')" style="cursor:pointer;font-weight:700;font-size:17px;letter-spacing:.05em;">JACOB<span style="color:var(--accent);">©</span></div>
  <div style="display:flex;gap:36px;font:400 12px/1 'Space Mono',monospace;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);">
    <span class="nav-link" onclick="go('work')">Travaux</span>
    <span class="nav-link" onclick="go('about')">À propos</span>
  </div>
</div>`;
}

function footer() {
  return `<div style="display:flex;align-items:center;justify-content:space-between;padding:40px 56px;border-top:1px solid var(--line);background:var(--bg2);">
  <div style="font-weight:700;font-size:15px;letter-spacing:.05em;">JACOB<span style="color:var(--accent);">©</span></div>
  <div style="font:400 11px/1 'Space Mono',monospace;letter-spacing:.06em;color:var(--faint);">© 2026 Alexis Jacob · Paris, France</div>
</div>`;
}

function home() {
  const featured = [0, 1, 3].map(i => {
    const s = SERIES[i];
    return `<div class="series-card" onclick="go('series',${i})" style="cursor:pointer;">
      ${coverImg(s, '100%', 420)}
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-top:18px;">
        <div class="sc-title" style="font-family:'Instrument Serif',serif;font-size:26px;">${s.title}</div>
        <div style="font:400 11px 'Space Mono',monospace;color:var(--faint);">${s.year}</div>
      </div>
      <div style="font:400 11px 'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:6px;">${s.kind} · ${s.count} photos</div>
    </div>`;
  }).join('');

  return `
  <div style="padding:80px 56px 0;">
    <div style="display:flex;justify-content:space-between;font:400 12px/1.6 'Space Mono',monospace;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;margin-bottom:40px;">
      <span>Alexis Jacob — Photographe</span><span>Paris &amp; ailleurs</span>
    </div>
    <h1 style="font-weight:700;font-size:128px;line-height:.9;letter-spacing:-.035em;text-transform:uppercase;">La ville<br><span style="font-family:'Instrument Serif',serif;font-weight:400;font-style:italic;text-transform:none;letter-spacing:0;color:var(--accent);">comme elle est</span></h1>
    <p style="max-width:540px;margin:36px 0 56px;font-size:16px;line-height:1.75;color:var(--muted);">New York, mai 2026. Douze images au Leica — entre les toits et les trottoirs, le bruit et le silence, ce que la ville montre et ce qu'elle cache.</p>
  </div>
  <div style="padding:0 56px;">${coverImg(SERIES[0], '100%', 620)}</div>

  <div style="padding:96px 56px 40px;">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:44px;">
      <div style="font:400 12px/1 'Space Mono',monospace;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;">Séries sélectionnées</div>
      <span onclick="go('work')" style="cursor:pointer;font:400 12px 'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);">Toutes les séries →</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:28px;">${featured}</div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;padding:96px 56px;margin-top:48px;background:var(--bg2);">
    ${box(GP[0], '100%', 480)}
    <div>
      <div style="font:400 12px/1 'Space Mono',monospace;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin-bottom:28px;">Derrière l'objectif</div>
      <p style="font-family:'Instrument Serif',serif;font-size:34px;line-height:1.4;">« Je photographie l'entre-deux — cette lumière tranquille aux bords d'un voyage, là où le paysage et l'inconnu ne font qu'un. »</p>
      <p style="margin-top:30px;font-size:15px;line-height:1.8;color:var(--muted);max-width:440px;">Une décennie à suivre les tempêtes, les routes et les saisons sous les latitudes nord.</p>
      <span onclick="go('about')" style="display:inline-block;margin-top:30px;cursor:pointer;font:400 12px 'Space Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--accent);padding-bottom:4px;">En savoir plus →</span>
    </div>
  </div>
`;
}

function work() {
  const rows = SERIES.map((s, i) => {
    const n = String(i + 1).padStart(2, '0');
    return `<div class="work-row" onclick="go('series',${i})" style="cursor:pointer;display:grid;grid-template-columns:64px 1fr 150px 70px 150px;gap:28px;align-items:center;padding:26px 0;border-bottom:1px solid var(--line);">
      <span style="font:400 13px 'Space Mono',monospace;color:var(--accent);">${n}</span>
      <div>
        <div style="font-weight:500;font-size:32px;letter-spacing:-.01em;">${s.title}</div>
        <div style="font-size:13px;line-height:1.6;color:var(--muted);margin-top:6px;max-width:480px;">${s.blurb}</div>
      </div>
      <span style="font:400 12px 'Space Mono',monospace;text-transform:uppercase;color:var(--faint);letter-spacing:.08em;">${s.kind}</span>
      <span style="font:400 12px 'Space Mono',monospace;color:var(--faint);">${s.year}</span>
      ${coverImg(s, '100%', 90)}
    </div>`;
  }).join('');

  return `<div style="padding:80px 56px 110px;min-height:80vh;">
    <div style="font:400 12px/1 'Space Mono',monospace;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin-bottom:18px;">Index des séries · 2014—2026</div>
    <h1 style="font-weight:700;font-size:80px;line-height:.95;letter-spacing:-.03em;text-transform:uppercase;margin-bottom:60px;">Travaux</h1>
    <div style="border-top:1px solid var(--line);">${rows}</div>
  </div>`;
}

function series() {
  const si = S.series;
  const n = SERIES.length;
  const s = SERIES[si];
  const pi = (si + n - 1) % n;
  const ni = (si + 1) % n;

  const gallery = s.photos
    ? s.photos.map((url, idx) =>
        `<div style="break-inside:avoid;margin-bottom:20px;"><img src="${url}" style="width:100%;display:block;cursor:zoom-in;" loading="lazy" onclick="openLB(${idx})"></div>`
      ).join('')
    : HEIGHTS.map((h, i) => {
        const gi = (si * 3 + i) % G.length;
        return `<div style="break-inside:avoid;margin-bottom:20px;">${box(G[gi], '100%', h)}</div>`;
      }).join('');

  return `<div style="padding:60px 56px 90px;">
    <span onclick="go('work')" style="cursor:pointer;font:400 12px 'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">← Toutes les séries</span>
    <div style="display:grid;grid-template-columns:1fr 360px;gap:48px;align-items:end;margin:36px 0 56px;padding-bottom:40px;border-bottom:1px solid var(--line);">
      <div>
        <div style="font:400 12px/1 'Space Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;">${s.kind} · ${s.year} · ${s.count} photos</div>
        <h1 style="font-weight:700;font-size:88px;line-height:.92;letter-spacing:-.03em;text-transform:uppercase;">${s.title}</h1>
      </div>
      <p style="font-family:'Instrument Serif',serif;font-size:24px;line-height:1.45;color:var(--text2);">${s.blurb}</p>
    </div>
    <div style="column-count:3;column-gap:20px;">${gallery}</div>
    <div style="display:flex;justify-content:space-between;margin-top:64px;padding-top:36px;border-top:1px solid var(--line);">
      <div onclick="go('series',${pi})" style="cursor:pointer;">
        <div style="font:400 11px 'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);">← Précédent</div>
        <div style="font-family:'Instrument Serif',serif;font-size:28px;margin-top:6px;">${SERIES[pi].title}</div>
      </div>
      <div onclick="go('series',${ni})" style="cursor:pointer;text-align:right;">
        <div style="font:400 11px 'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);">Suivant →</div>
        <div style="font-family:'Instrument Serif',serif;font-size:28px;margin-top:6px;">${SERIES[ni].title}</div>
      </div>
    </div>
  </div>`;
}

function about() {
  return `<div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:72px;padding:80px 56px;align-items:start;">
      <div style="position:sticky;top:100px;">${box(GP[1], '100%', 600)}</div>
      <div>
        <div style="font:400 12px/1 'Space Mono',monospace;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin-bottom:24px;">À propos</div>
        <h1 style="font-family:'Instrument Serif',serif;font-weight:400;font-size:56px;line-height:1.1;margin-bottom:36px;">Alexis Jacob</h1>
        <p style="font-size:17px;line-height:1.85;color:var(--text2);margin-bottom:22px;">Je suis un photographe amateur basé à Paris, travaillant là où la lumière et la route me mènent — le plus souvent dans les coins froids et silencieux de l'hémisphère nord.</p>
        <p style="font-size:16px;line-height:1.85;color:var(--muted);margin-bottom:22px;">Depuis dix ans, je réalise de longs voyages lents avec un appareil photo : deux semaines à traquer la lumière des tempêtes sur les glaces de Patagonie, un hiver à réduire Hokkaido à la neige et à l'ombre, trois mille miles d'autoroute ouverte et les inconnus rencontrés en chemin. Le travail vit dans l'entre-deux — ces moments où un paysage et ceux qui le traversent deviennent la même image.</p>
        <p style="font-size:16px;line-height:1.85;color:var(--muted);">La photographie pour le plaisir — celle qui est lente, patiente, et qui vous demande de vous arrêter et de regarder.</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:36px 48px;margin-top:56px;padding-top:40px;border-top:1px solid var(--line);">
          <div>
            <div style="font:400 11px 'Space Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;">Matériel</div>
            <div style="font-size:14px;line-height:2;color:var(--text2);">Canon Mark III<br>Leica typ 240</div>
          </div>
          <div>
            <div style="font:400 11px 'Space Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;">Basé à</div>
            <div style="font-size:14px;line-height:2;color:var(--text2);">Paris, France<br>Voyage dans le monde entier</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// — Lightbox —
const LB = { photos: [], idx: 0, tx: 0 };
const lbEl  = () => document.getElementById('lb');
const lbImg = () => document.getElementById('lb-img');

function openLB(idx) {
  const photos = SERIES[S.series].photos;
  if (!photos) return;
  LB.photos = photos;
  LB.idx = idx;
  lbImg().src = photos[idx];
  lbEl().classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  lbEl().classList.remove('open');
  document.body.style.overflow = '';
}

function lbNav(dir) {
  LB.idx = (LB.idx + dir + LB.photos.length) % LB.photos.length;
  lbImg().src = LB.photos[LB.idx];
}

document.addEventListener('keydown', e => {
  if (!lbEl().classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbNav(1);
  else if (e.key === 'ArrowLeft') lbNav(-1);
  else if (e.key === 'Escape') closeLB();
});

lbEl().addEventListener('touchstart', e => { LB.tx = e.touches[0].clientX; }, { passive: true });
lbEl().addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - LB.tx;
  if (Math.abs(dx) > 40) lbNav(dx < 0 ? 1 : -1);
});

function render() {
  const views = { home, work, series, about };
  const content = (views[S.view] || home)();
  document.getElementById('app').innerHTML = nav() + content + footer();
}

readHash();
render();
</script>
