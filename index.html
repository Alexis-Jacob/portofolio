  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; background: #f8f7f3; }
    ::selection { background: #b1803f; color: #fff; }
    :root {
      --bg: #f8f7f3;
      --bg2: #eeebe2;
      --navbg: rgba(248,247,243,.82);
      --text: #1b1813;
      --text2: #3c362b;
      --muted: #6f6757;
      --faint: #9c9484;
      --accent: #b1803f;
      --line: rgba(28,24,18,.12);
    }
    #app { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }
    .ph { display: block; }
    .nav-link { cursor: pointer; transition: color .2s; }
    .nav-link:hover { color: var(--text) !important; }
    .btn-outline { transition: all .2s; }
    .btn-outline:hover { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
    .work-row { transition: background .2s; }
    .work-row:hover { background: rgba(28,24,18,.03); }
    .series-card:hover .sc-title { color: var(--accent); transition: color .2s; }
    input, textarea {
      display: block; width: 100%; background: transparent; border: none;
      border-bottom: 1px solid rgba(28,24,18,.2); color: var(--text);
      font-family: 'Space Grotesk', sans-serif; font-size: 16px; outline: none;
      padding: 14px 0; transition: border-color .2s;
    }
    input::placeholder, textarea::placeholder { color: var(--faint); }
    input:focus, textarea:focus { border-bottom-color: var(--accent); }
    textarea { resize: vertical; }
    button[type=submit]:hover { opacity: .88; }
    h1, h2, p { margin: 0; }
    #lb { display:flex; align-items:center; justify-content:center; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.93); touch-action:none; visibility:hidden; pointer-events:none; }
    #lb.open { visibility:visible; pointer-events:all; }
    #lb img { max-width:90vw; max-height:90vh; object-fit:contain; user-select:none; display:block; }
    #lb-prev, #lb-next { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: #fff; font-size: 52px; line-height: 1; cursor: pointer; padding: 16px 24px; opacity: .55; transition: opacity .15s; }
    #lb-prev:hover, #lb-next:hover { opacity: 1; }
    #lb-prev { left: 0; }
    #lb-next { right: 0; }
    #lb-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 36px; line-height: 1; cursor: pointer; opacity: .6; transition: opacity .15s; padding: 8px; }
    #lb-close:hover { opacity: 1; }
    .s-wrap { padding:60px 56px 90px; }
    .s-head { display:grid; grid-template-columns:1fr 360px; gap:48px; align-items:end; margin:36px 0 56px; padding-bottom:40px; border-bottom:1px solid var(--line); }
    .s-h1 { font-weight:700; font-size:88px; line-height:.92; letter-spacing:-.03em; text-transform:uppercase; margin:0; }
    .s-cols { column-count:3; column-gap:20px; }
    @media (max-width: 700px) {
      .s-wrap { padding:28px 18px 60px; }
      .s-head { grid-template-columns:1fr; gap:20px; }
      .s-h1 { font-size:44px; }
      .s-cols { column-count:2; }
    }
    @media (max-width: 600px) {
      #lb-prev, #lb-next { font-size: 38px; padding: 12px 16px; opacity: .7; }
    }
  </style>
</head>

function box(g, w, h) {
  return `<div class="ph" style="width:${w};height:${h}px;background:${g};"></div>`;

function coverImg(s, w, h) {
  return s.cover
    ? `<img src="${s.cover}" style="width:${w};height:${h}px;object-fit:cover;display:block;" loading="lazy">`
    : box(G[s.grad], w, h);
}

function readHash() {
  const h = window.location.hash.slice(1) || 'home';
  const [view, si, ii] = h.split('/');
  S.view = ['home','work','series','about'].includes(view) ? view : 'home';
  if (si !== undefined) S.series = parseInt(si, 10) || 0;
  S.image = ii !== undefined ? parseInt(ii, 10) : undefined;
}

function go(view, si) {
  S.view = view;
  if (si !== undefined) S.series = si;
  const hash = si !== undefined ? `${view}/${si}` : view;
  history.pushState(null, '', '#' + hash);
  render();
  window.scrollTo(0, 0);
}

window.addEventListener('popstate', () => { readHash(); render(); window.scrollTo(0, 0); });

// — Lightbox —
const LB = { photos: [], idx: 0, tx: 0 };
const lbEl  = () => document.getElementById('lb');
const lbImg = () => document.getElementById('lb-img');

function openLB(idx) {
  const photos = SERIES[S.series].photos;
  if (!photos) return;
  LB.photos = photos;
  LB.idx = idx;
  lbImg().src = photos[idx];
  lbEl().classList.add('open');
  document.body.style.overflow = 'hidden';
  history.replaceState(null, '', `#series/${S.series}/${idx}`);
}

function closeLB() {
  lbEl().classList.remove('open');
  document.body.style.overflow = '';
  history.replaceState(null, '', `#series/${S.series}`);
}

function lbNav(dir) {
  LB.idx = (LB.idx + dir + LB.photos.length) % LB.photos.length;
  lbImg().src = LB.photos[LB.idx];
  history.replaceState(null, '', `#series/${S.series}/${LB.idx}`);
}

document.addEventListener('keydown', e => {
  if (!lbEl().classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbNav(1);
  else if (e.key === 'ArrowLeft') lbNav(-1);
  else if (e.key === 'Escape') closeLB();
});

lbEl().addEventListener('touchstart', e => { LB.tx = e.touches[0].clientX; }, { passive: true });
lbEl().addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - LB.tx;
  if (Math.abs(dx) > 40) lbNav(dx < 0 ? 1 : -1);
});

function render() {
  const views = { home, work, series, about };
  const content = (views[S.view] || home)();
  document.getElementById('app').innerHTML = nav() + content + footer();
}
